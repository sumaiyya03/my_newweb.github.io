<!DOCTYPE html>
<html>
<head>
  <title>MoodNest</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>MoodNest 🌸</h1>
  <input type="text" id="search" placeholder="Search vibe...">
  <button onclick="toggleDarkMode()">🌙</button>
</header>

<div class="filters">
  <button onclick="filterMood('all')">All</button>
  <button onclick="filterMood('calm')">Calm</button>
  <button onclick="filterMood('hustle')">Hustle</button>
  <button onclick="filterMood('aesthetic')">Aesthetic</button>
</div>

<section id="pinContainer" class="grid"></section>

<script src="script.js"></script>
</body>
</html>
